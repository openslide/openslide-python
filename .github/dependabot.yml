version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    commit-message:
      prefix: workflows
    groups:
      deps:
        patterns: ["*"]
    labels: ["dependencies"]
    schedule:
      interval: monthly

  - package-ecosystem: pre-commit
    directory: /
    commit-message:
      prefix: pre-commit
    groups:
      deps:
        patterns: ["*"]
    ignore:
      # The pre-commit config declares the minimum version, and we shouldn't
      # bump that
      - dependency-name: pillow
    labels: ["dependencies"]
    schedule:
      interval: monthly
